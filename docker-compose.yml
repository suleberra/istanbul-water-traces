services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: istanbul_water_postgis
    environment:
      POSTGRES_DB: istanbul_water_traces
      POSTGRES_USER: gis
      POSTGRES_PASSWORD: gis_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data:/data

volumes:
  postgres_data: